[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "sysadmin-rl"
version = "0.1.0"
description = "SysAdmin RL Environment for Hackathon"
dependencies = [
    "flask",
    "numpy",
    "openenv-core>=0.2.0",
]

[project.scripts]
server = "app:run_flask"

[tool.setuptools]
packages = ["."]
