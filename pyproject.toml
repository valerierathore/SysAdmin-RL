[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "sysadmin-rl"
version = "0.1.0"
description = "SysAdmin RL Environment"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "flask",
    "numpy",
    "openenv-core>=0.2.0",
]

[project.scripts]
server = "server.app:main"

[tool.setuptools]
packages = ["server"]
